<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBio AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">InstaBio AI</h1>
        <p class="text-gray-600 mb-6">Craft your perfect Instagram bio instantly!</p>
        <form id="bioForm" class="space-y-4">
            <div>
                <input type="text" id="keywords" placeholder="Keywords (e.g., travel, food)" class="w-full p-3 border border-gray-300 rounded-md focus:ring-purple-500 focus:border-purple-500">
            </div>
            <div>
                <select id="tone" class="w-full p-3 border border-gray-300 rounded-md focus:ring-purple-500 focus:border-purple-500">
                    <option value="">Select Tone</option>
                    <option value="professional">Professional</option>
                    <option value="funny">Funny</option>
                    <option value="inspirational">Inspirational</option>
                    <option value="casual">Casual</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white p-3 rounded-md hover:bg-purple-700 transition duration-300">
                Generate Bio
            </button>
        </form>
        <div id="result" class="mt-6 p-4 bg-gray-100 rounded-md text-gray-800 text-left hidden">
            <h2 class="font-semibold text-lg mb-2">Your New Bio:</h2>
            <p id="bioOutput"></p>
        </div>
        <p class="mt-6 text-sm text-gray-500">Powered by AI. ✨</p>
    </div>
    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const bioOutput = document.getElementById('bioOutput');
            const resultDiv = document.getElementById('result');
            
            bioOutput.textContent = 'Generating...';
            resultDiv.classList.remove('hidden');

            // In a real app, this would be an API call to your backend.
            // For this example, we'll simulate a response.
            setTimeout(() => {
                const generatedBio = `👋 Hi there! ${tone ? `I'm a ${tone}` : 'I am'} obsessed with ${keywords || 'life'}. Let's connect!`;
                bioOutput.textContent = generatedBio;
            }, 1500);
        });
    </script>
</body>
</html>
