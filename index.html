<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Bio Magic</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f8f9fa; margin: 0; }
        .container { background-color: #ffffff; padding: 2.5rem; border-radius: 0.8rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 550px; width: 95%; text-align: center; }
        h1 { color: #343a40; margin-bottom: 1.5rem; font-size: 2rem; }
        p { color: #6c757d; margin-bottom: 2rem; }
        label { font-weight: bold; margin-bottom: 0.5rem; display: block; text-align: left; }
        input[type="text"] { border-radius: 0.5rem; padding: 0.75rem; border: 1px solid #ced4da; width: 100%; margin-bottom: 1.5rem; box-sizing: border-box; }
        button { background-color: #007bff; color: white; padding: 0.8rem 1.5rem; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 1.1rem; transition: background-color 0.3s ease; width: 100%; }
        button:hover { background-color: #0056b3; }
        #bioOutput { margin-top: 2rem; text-align: left; padding: 1rem; background-color: #e9ecef; border-radius: 0.5rem; min-height: 80px; white-space: pre-wrap; word-wrap: break-word; color: #343a40; font-size: 1rem; }
        .price-tag { font-size: 1.2rem; font-weight: bold; color: #28a745; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Instant Bio Magic ✨</h1>
        <p class="price-tag">Get it for just $2.99!</p>
        <p>Craft your perfect Instagram bio in seconds with AI. Just tell us about yourself!</p>
        <form id="bioForm">
            <div class="form-group">
                <label for="keywords">Keywords (e.g., photographer, traveler, foodie):</label>
                <input type="text" class="form-control" id="keywords" placeholder="Enter keywords separated by commas">
            </div>
            <button type="submit" class="btn btn-primary">Generate Bio</button>
        </form>
        <div id="bioOutput" class="mt-4">Your generated bio will appear here!</div>
    </div>
    <script>
        document.getElementById('bioForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const outputDiv = document.getElementById('bioOutput');
            outputDiv.innerHTML = 'Generating your awesome bio...';

            // In a real app, this would call an API endpoint after successful payment.
            // For this MVP, we'll simulate a response.
            setTimeout(() => {
                if (keywords.includes('photographer') && keywords.includes('traveler')) {
                    outputDiv.innerHTML = "📸 World-traveling photographer. Capturing moments, one adventure at a time. Let's connect! ✈️";
                } else if (keywords.includes('developer') && keywords.includes('code')) {
                    outputDiv.innerHTML = "Building the future, one line of code at a time. 💻 Passionate about tech & innovation. Always learning! ✨";
                } else {
                    outputDiv.innerHTML = `🌟 ${keywords.split(',').map(k => k.trim()).filter(Boolean).map(k => '#' + k).join(' ')} 🌟 | Living my best life. Let's connect!`;
                }
            }, 1500);
        });
    </script>
</body>
</html>
